<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High School Achievements</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="royal-theme">
    <div class="portfolio-container">
        <a href="{{ url_for('home') }}" class="back-home-btn">
            ← Return to Gateway
        </a>
        <div class="page-layout-with-sidebar">
            <div class="royal-sidebar-accent">
                <div class="sidebar-diamond">◆</div>
                <div class="sidebar-line"></div>
            </div>
            <div class="page-focus-view">
                <h2 class="section-title">Honor Societies & Leadership</h2>
                <div class="royal-divider-small"></div>
                {% for item in cords_and_societies %}
                <div class="timeline-entry-block">
                    <h3 class="entry-heading">
                        {{ item.title }}
                    </h3>
                    <p class="entry-description">
                        {{ item.desc }}
                    </p>
                </div>
                {% endfor %}
                <h2 class="section-title" style="margin-top: 20px;">
                    Activities & Leadership
                </h2>bnjv
                <div class="royal-divider-small"></div>
                {% for item in activities %}
                <div class="timeline-entry-block">
                    <span class="white-circle-badge">
                        {{ item.time }}
                    </span>
                    <h3 class="entry-heading">
                        {{ item.title }}
                    </h3>
                    <p class="entry-description">
                        {{ item.desc }}
                    </p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
