<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance & Hobbies Portfolio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="royal-theme">
    <div class="portfolio-container">
        <a href="{{ url_for('home') }}" class="back-home-btn">← Return to Gateway</a>
        <div class="page-layout-with-sidebar">
            <div class="royal-sidebar-accent">
                <div class="sidebar-diamond">◆</div>
                <div class="sidebar-line"></div>
            </div>
            <div class="page-focus-view">
                <h2 class="section-title">Dance & Performance Portfolio</h2>
                <div class="royal-divider-small"></div>
                {% for performance in dance_performances %}
                <div class="timeline-entry-block">
                    <span class="white-circle-badge">
                        {{ performance.type }}
                    </span>
                    <h3 class="entry-heading">
                        {{ performance.event }}
                    </h3>
                    <p class="entry-description">
                        {{ performance.desc }}
                    </p>
                </div>
                {% endfor %}
                <h2 class="section-title" style="margin-top:20px;">
                    Hobbies & Interests
                </h2>
                <div class="royal-divider-small"></div>
                {% for hobby in creative_hobbies %}
                <div class="timeline-entry-block">
                    <span class="white-circle-badge">
                        Hobby
                    </span>
                    <h3 class="entry-heading">
                        {{ hobby.title }}
                    </h3>
                    <p class="entry-description">
                        {{ hobby.desc }}
                    </p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
