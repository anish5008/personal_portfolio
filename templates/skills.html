<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Skills</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="royal-theme">
    <div class="portfolio-container">
        <a href="{{ url_for('home') }}" class="back-home-btn">
            ← Return to Gateway
        </a>
        <div class="page-layout-with-sidebar">
            <div class="royal-sidebar-accent">
                <div class="sidebar-diamond">◆</div>
                <div class="sidebar-line"></div>
            </div>
            <div class="page-focus-view">
                <h2 class="section-title">
                    Technical Skills
                </h2>
                <div class="royal-divider-small"></div>
                <div class="skills-grid-royal">
                    {% for skill in technical_skills %}
                    <div class="skill-brick-gold">
                        {{ skill }}
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
